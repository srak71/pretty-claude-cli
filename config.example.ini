# pretty-claude-cli configuration.
#
# The installer copies this to ~/.claude/pretty-claude-cli/config.ini for you.
# You can also point PRETTY_CLAUDE_CONFIG at a file, or place config.ini in
# ~/.config/pretty-claude-cli/ or next to statusline.py. First found wins.
#
# Edit freely and start a new Claude Code session (or wait a refresh tick).
# Everything is optional — omit a key to use its built-in default.
#
# COLOR FORMAT — every *_color accepts either:
#   • truecolor  R;G;B   e.g. 135;206;235   (24-bit, recommended)
#   • an SGR code N       e.g. 97 = bright white, 32 = green, 96 = cyan
#
# NOTE: this is an INI file. Do NOT quote values. '#' starts a comment
# (anywhere on a line); values themselves must not contain '#'.

[default]
device_color   = 135;206;235   # OS label, separators, % sign, time units
sep_color      =               # blank = match device_color
unit_color     =               # blank = match device_color
path_color     = 97            # working directory (bright white)
accent_color   = 255;140;80    # the "Claude Pro" label (warm orange)

# Path display: home  → substitute your home dir with ~ (e.g. ~/projects/app)
#               prefix→ literally prepend ~            (e.g. ~/Users/you)
path_style     = home

# Model name: 1 = flows the bar's rainbow; 0 = solid model_color
model_rainbow  = 1
model_color    = 70;130;180

# Section separator glyph. Try: | │ ┆ ║ • ·
sep_char       = ┃

# Emoji temperature sequence — five stages by context-window usage.
# Keep heat_emojis and heat_colors the same length; heat_thresholds is one
# shorter (the boundaries between stages).
heat_emojis      = 🧊 🌡️ 🔥 💥 ☢️     # stage 0 → 4 (cool → critical)
heat_thresholds  = 20 40 60 80         # <20→0, <40→1, <60→2, <80→3, ≥80→4
heat_colors      = 96 92 93 91 95      # emoji tint per stage
# Alternates to try (replace heat_emojis above):
#   🌱 🌿 🍂 🔥 🌋
#   😌 🙂 😅 😰 🥵
#   🟢 🟡 🟠 🔴 ⚫

# Rainbow loading bar
bar_width       = 24     # number of cells
bar_speed       = 0.03   # hue drift per second (smaller = calmer)
bar_span        = 24     # cells the rainbow spans (smaller = tighter)
bar_neon_floor  = 90     # 0-255 vibrancy lift (higher = pastel glow)
bar_filled      = ●
bar_empty       = ○
bar_empty_color = 90     # dim gray for empty cells

# ─── Per-device color profiles ──────────────────────────────────────────────
# Overrides [default] on the machine whose short hostname matches. Section name
# is  host:<hostname>  (lowercase). Find your hostname:
#   macOS/Linux:  hostname -s        Windows (PowerShell):  $env:COMPUTERNAME
# Uncomment and rename to your machines:
#
# [host:my-macbook]
# device_color = 135;206;235     # sky blue
#
# [host:my-linux-box]
# device_color = 32              # green
#
# [host:my-windows-pc]
# device_color = 170;120;255     # violet
